package:
  name: hylograph-layout-demo
  description: Interactive gallery showcasing Hylograph layout algorithms
  dependencies:
    - aff: ">=8.0.0 <9.0.0"
    - affjax: ">=13.0.0 <14.0.0"
    - affjax-web: ">=1.0.0 <2.0.0"
    - arrays: ">=7.3.0 <8.0.0"
    - console: ">=6.1.0 <7.0.0"
    - effect: ">=4.0.0 <5.0.0"
    - either: ">=6.1.0 <7.0.0"
    - foldable-traversable: ">=6.0.0 <7.0.0"
    - free: ">=7.1.0 <8.0.0"
    - halogen: ">=7.0.0 <8.0.0"
    - hylograph-layout: "*"
    - hylograph-selection: ">=0.3.1 <0.4.0"
    - integers: ">=6.0.0 <7.0.0"
    - lists: ">=7.0.0 <8.0.0"
    - maybe: ">=6.0.0 <7.0.0"
    - nullable: ">=6.0.0 <7.0.0"
    - numbers: ">=9.0.1 <10.0.0"
    - ordered-collections: ">=3.2.0 <4.0.0"
    - prelude: ">=6.0.2 <7.0.0"
    - random: ">=6.0.0 <7.0.0"
    - strings: ">=6.0.1 <7.0.0"
    - transformers: ">=6.1.0 <7.0.0"
    - tuples: ">=7.0.0 <8.0.0"
    - unsafe-coerce: ">=6.0.0 <7.0.0"

  bundle:
    module: Gallery.Main
    outfile: public/bundle.js
    platform: browser
